name: "generic-problem-solving"
version: "v1_scaffold"
source: "curated"
domain: "general"
task_type: "general"
when_to_use: "When solving any structured analytical problem that requires reasoning through given information to select the correct answer from multiple choice options"
when_not_to_use: "When the problem requires no reasoning or analysis, such as simple factual recall or direct lookup questions"
preconditions:
  - "The problem statement provides sufficient information to determine a unique correct answer"
  - "There are well-defined answer options to choose from and exactly one is correct"
  - "The problem requires multi-step reasoning or analysis rather than immediate recognition"
procedure:
  - step: "Read the problem statement carefully and identify the core question. Determine exactly what quantity, decision, or conclusion you are being asked to find. Restate the goal in your own words to confirm understanding. Note the format of the expected answer."
    check: "Can you state the goal in one clear sentence? Do you understand what form the answer should take? Have you identified whether you need to find a quantity, make a selection, or determine a relationship?"
  - step: "Extract and organize all given information. List every piece of data, every condition, and every relationship stated in the problem. Organize these systematically. Convert any verbal descriptions into precise numerical or logical statements that you can work with directly."
    check: "Have you captured every piece of data mentioned in the problem? Are all conditions and relationships listed? Have you converted qualitative descriptions into workable precise statements? Did you re-read to make sure nothing was missed?"
  - step: "Classify the problem type and select an appropriate solution approach. Based on the structure of the information and what is being asked, determine what category of problem this is. Choose a solution method that is well-suited to this type of problem and plan your overall approach before proceeding."
    check: "Can you name the general problem category? Have you chosen a solution method that is appropriate for this type of problem? Can you outline the key steps of your approach before executing them?"
  - step: "Set up the formal structure of your solution. Translate the problem into a precise framework using the method you selected. Define any variables, expressions, or relationships you will need. Establish the connections between your given information and what you need to find."
    check: "Have you clearly defined all variables and expressions? Does your formal setup correctly capture all the given information and conditions? Is the structure complete, or are you missing any necessary components?"
  - step: "Execute your solution method step by step. Work through your planned approach carefully, showing each intermediate result. Perform all calculations deliberately, double-checking arithmetic at each stage. Keep track of units and signs throughout the process."
    check: "Is each step logically following from the previous one? Have you double-checked your arithmetic at each stage? Are intermediate results reasonable? Have you maintained consistency in units and signs throughout?"
  - step: "Verify your answer against all stated conditions and select the matching option. Substitute your result back into every condition from the original problem to confirm it is consistent. Check that your answer is reasonable given the context. Compare with the available answer choices and select the one that matches."
    check: "Does your answer satisfy every requirement stated in the problem? Is the result reasonable in context? Have you checked it against all conditions, not just some? Does it match one of the given options exactly?"
common_failures:
  - "Overlooking a condition, requirement, or piece of information stated in the problem, especially those mentioned indirectly or embedded within longer sentences"
  - "Making arithmetic or algebraic errors during intermediate calculation steps, particularly sign errors, order-of-operations mistakes, or unit conversion errors"
  - "Failing to verify the final answer against all stated conditions, leading to a result that satisfies some but not all requirements of the problem"
  - "Jumping to a conclusion without systematic reasoning, selecting an answer that seems intuitively plausible but has not been rigorously derived from the given information"
verification: "Re-read the original problem statement in full. Verify that your answer satisfies every stated condition and requirement by checking each one explicitly. Recompute the key calculation to confirm the numerical result. Ensure your answer matches one of the provided options exactly."

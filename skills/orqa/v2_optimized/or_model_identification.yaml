name: or-model-identification
version: v2_curated
source: curated
domain: operations_research
task_type: or_model_identification
when_to_use: 'When answering questions that require identifying components of an optimization model from a natural-language problem description -- including decision variables, parameters, sets, objective
  function, constraints, problem category, or model type (LP/IP/MILP/NLP).

  '
when_not_to_use: 'When asked to numerically solve an optimization model, generate code, prove optimality, or apply advanced OR techniques such as decomposition, column generation, or metaheuristics. This
  skill covers model identification only, not solution procedures.

  '
preconditions:
- A natural-language description of an optimization scenario is provided, containing a decision-maker, a goal, controllable choices, given data, and restrictions.
- 'The question asks about one or more model components: objective criterion, constraints, sets, parameters, decision variables, problem category, or model type.'
- Enough contextual detail exists in the problem description to distinguish the requested component from plausible distractors.
procedure:
- step: "Read the question stem carefully before analyzing the problem description. Determine what specific model component the question asks about. The target will be one of: (a) Decision variables / decision\
    \ activities -- what the decision-maker\n    controls or chooses;\n(b) Parameters / given data -- fixed constants, coefficients, costs,\n    capacities, demands;\n(c) Objective function -- what is maximized\
    \ or minimized, and which\n    variables and parameters participate;\n(d) Constraints / restrictions -- limits, requirements, balance\n    equations, logical conditions;\n(e) Sets -- indexing collections\
    \ (time periods, locations, products,\n    people, machines);\n(f) Model type -- LP, ILP, MILP, NLP classification; (g) Problem category -- assignment, routing, scheduling, blending,\n    facility location,\
    \ etc.;\n(h) Relationships -- how specific components relate to each other\n    (e.g., which parameter appears in which constraint).\n\nCRITICAL: Note the EXACT phrasing of the question. Pay special\
    \ attention to:\n- Negations (\"which is NOT\", \"does not define\", \"are not participating\") -- these require identifying the component that is FALSE or ABSENT.\n- Superlatives (\"which BEST\") --\
    \ these require selecting the most precise match.\n- Specificity (\"which of the following constraints\" vs. \"which constraint type\") -- match the granularity.\n- Prepositions (\"applied on\", \"\
    participating in\", \"define\") -- these specify the relationship being queried. For \"applied on\", identify the domain/index set of the constraint.\n"
  check: 'Can you state in one sentence what model component the question targets? Have you explicitly noted any negations, qualifiers, prepositions, or specificity in the question stem? Is your identified
    target one of the eight categories listed above? Have you avoided jumping to the problem description before understanding the question?

    '
- step: "Read the full problem description. Identify trigger cues and match the scenario to one of the following OR archetypes. Use the matched archetype to activate priors about expected model components.\n\
    --- ARCHETYPE LIBRARY ---\n**Assignment/Matching:** - Trigger cues: \"assign X to Y\", \"allocate workers to tasks\",\n  \"match patients to rooms\", \"select which items to include\"\n- Variables:\
    \ binary x_ij indicating whether entity i is assigned\n  to entity j (or binary selection indicators)\n- Objective: minimize total cost or distance, maximize total\n  satisfaction or value or rating\
    \ score\n- Constraints: each task assigned exactly once, each worker or\n  resource has a capacity limit, assignment feasibility (not every\n  pair is valid)\n- Common confusion: treating demand or\
    \ capacity (a parameter) as a\n  decision variable; mistaking \"broadcast order\" for a decision\n  when only \"broadcast indicator\" (whether to air) is decided\n\n**Routing/Network:** - Trigger cues:\
    \ \"route through\", \"ship from...to...\", \"network\n  flow\", \"shortest path\", \"deliver along routes\", \"distribute\n  through a network\"\n- Variables: flow quantities on arcs (continuous),\
    \ binary route\n  selections, number of items on each route\n- Objective: minimize total transportation cost or distance,\n  maximize total flow or throughput\n- Constraints: flow conservation at each\
    \ node (inflow = outflow),\n  arc capacity limits, supply limits at sources, demand satisfaction\n  at destinations\n- Common confusion: confusing node capacity with arc capacity;\n  listing \"number\
    \ of sources\" or \"number of destinations\" as\n  decisions when they are given data (sets)\n\n**Scheduling/Timetabling:** - Trigger cues: \"schedule tasks\", \"time slots\", \"sequence jobs\",\n \
    \ \"due dates\", \"broadcasting lineup\", \"shift scheduling\",\n  \"assign sessions to rooms\"\n- Variables: start times (continuous), binary assignment of tasks\n  to slots or machines, completion\
    \ times, sequencing indicators\n- Objective: minimize makespan or total tardiness or completion\n  time, maximize utilization or total value of completed tasks\n- Constraints: precedence relations (task\
    \ A before task B), no\n  overlap on a single machine, resource capacity per period,\n  deadline satisfaction, transition or setup times between tasks\n- Common confusion: treating processing time or\
    \ duration (a\n  parameter) as a decision variable; confusing \"task order\" with\n  \"task selection\" when the problem only decides which tasks to do\n\n**Blending/Mixing:** - Trigger cues: \"blend\"\
    , \"mix ingredients\", \"recipe\", \"meet\n  quality specifications\", \"combine raw materials\"\n- Variables: continuous proportions or quantities of each\n  ingredient in the blend\n- Objective: minimize\
    \ total cost of the blend or mixture - Constraints: quality specification bounds (minimum and maximum\n  for each attribute like protein content, fat percentage),\n  total quantity or volume requirement,\
    \ availability limits\n  for each ingredient\n- Common confusion: treating a quality specification threshold\n  (a parameter) as a decision; confusing the blend ratio\n  (decision) with the ingredient\
    \ quality score (parameter)\n\n**Facility Location:** - Trigger cues: \"open or close facilities\", \"locate warehouses\",\n  \"decide which plants to build\", \"select sites\", \"which\n  hospitals\
    \ to close\"\n- Variables: binary open/close indicators for each facility +\n  continuous allocation of demand to open facilities\n- Objective: minimize total fixed cost (opening) + variable cost\n\
    \  (shipping or assignment), or maximize coverage or efficiency\n- Constraints: demand satisfaction (each customer served), capacity\n  limit if facility is open, logical linking (cannot ship from or\n\
    \  assign to a closed facility), cardinality limit (at most k\n  facilities open)\n- Common confusion: missing the binary nature of open/close\n  decisions, leading to MILP misclassified as LP; forgetting\
    \ the\n  linking constraint between binary open/close and continuous flow\n\n**Production Planning/Lot-sizing:** - Trigger cues: \"produce over multiple periods\", \"inventory\n  levels\", \"holding\
    \ cost\", \"setup cost per period\", \"multi-period\n  production\"\n- Variables: production quantities per period (continuous or\n  integer), inventory levels at end of each period, binary setup\n\
    \  indicators (whether to produce in a given period)\n- Objective: minimize total production cost + holding cost +\n  setup cost over all periods\n- Constraints: inventory balance equation (inventory_end\
    \ =\n  inventory_begin + production - demand), production capacity per\n  period, storage capacity limit, non-negativity of inventory\n- Common confusion: missing the inventory balance equation as a\n\
    \  constraint; treating demand per period (a parameter) as a\n  decision variable; confusing \"number of periods\" (a set) with a\n  decision\n\n**Transportation:** - Trigger cues: \"transport from\
    \ sources to destinations\", \"supply\n  and demand\", \"shipping cost from factory to customer\", \"delivery\n  from warehouses to stores\"\n- Variables: quantity shipped on each source-destination\
    \ route\n  (continuous)\n- Objective: minimize total shipping or transportation cost - Constraints: supply limits at each source (total shipped out\n  does not exceed supply), demand satisfaction at\
    \ each destination\n  (total received meets or exceeds demand), non-negativity of\n  shipment quantities\n- Common confusion: confusing total supply or total demand (an\n  aggregate parameter) with\
    \ per-route capacity; treating shipping\n  cost (a parameter) as a decision variable\n\n--- END ARCHETYPE LIBRARY ---\nAfter identifying the archetype, also apply these high-precision local rules (Layer\
    \ 3): - \"assign...to...\" or \"allocate...to...\" => assignment archetype - \"maximize profit\" or \"minimize cost\" => confirms objective direction - \"at most\" => upper bound constraint (<=) - \"\
    at least\" => lower bound constraint (>=) - \"exactly\" => equality constraint (=) - \"whether to open/close\" or \"decide which to build\" => binary\n  variable present => model is MILP or ILP, not\
    \ pure LP\n- \"for each\" or \"per\" => signals the constraint or parameter is\n  indexed over a set\n\nIf the scenario does not clearly match a single archetype, identify the closest one and note the\
    \ deviation. Some problems blend two archetypes (e.g., facility location with transportation).\n"
  check: 'Have you identified the primary archetype for this problem? Can you cite at least two trigger cues from the problem text that support your archetype choice? Have you activated the archetype-specific
    priors for variables, objective, and constraints? If the problem blends archetypes, have you noted which elements come from which archetype? Have you applied any relevant high-precision local rules?

    '
- step: "Using the archetype priors from Stage B as guidance for what to look for, systematically instantiate the model skeleton by filling in each component with evidence from the problem text:\n(1) SETS\
    \ -- Identify the indexing collections. These are groups of\n    entities you iterate over: time periods, locations, products,\n    customers, machines, workers, routes. A set is \"the collection\n\
    \    you iterate over,\" NOT an individual number or cost. For each\n    set, cite the text that establishes it.\n\n(2) DECISION VARIABLES -- Identify what the decision-maker can\n    control or choose.\
    \ For each candidate variable, verify: \"Does\n    the problem text explicitly say this is something the decision-\n    maker decides?\" The archetype priors suggest likely variable\n    types (binary\
    \ for assignment, continuous for blending, etc.)\n    but only accept variables with direct textual support. Classify\n    each as continuous, binary, or integer.\n\n(3) PARAMETERS -- Identify given\
    \ constants and fixed data: costs,\n    capacities, demands, distances, durations, quality scores. For\n    each parameter, note which sets it is indexed over (e.g.,\n    \"shipping cost\" indexed over\
    \ factories x customers). If the\n    value is given and fixed, it is a parameter; if the decision-\n    maker chooses it, it is a variable.\n\n(4) OBJECTIVE -- State the direction (maximize or minimize)\
    \ and\n    the quantity being optimized. Identify which decision variables\n    and which parameters participate as coefficients. Cross-check\n    against the archetype's expected objective form. If\
    \ the\n    objective involves no explicit data parameters (e.g., minimizing\n    makespan), state that clearly.\n\n(5) CONSTRAINTS -- For each constraint, determine:\n    (a) Type: capacity limit, demand\
    \ satisfaction, balance equation,\n        assignment, cardinality bound, logical/linking, non-negativity\n    (b) Left-hand side: what is aggregated and over which index\n    (c) Relation: <=, >=,\
    \ or =\n    (d) Right-hand side: what given data or value\n    (e) Applied on: which set element (\"for each customer\", \"for\n        each period\")\n    Pay special attention to implicit constraints\
    \ suggested by the\n    archetype: inventory balance equations for lot-sizing, linking\n    constraints for facility location, flow conservation for\n    networks, non-negativity and binary restrictions.\n\
    \n(6) MODEL TYPE -- Based on variables and function forms:\n    All continuous + linear => LP.\n    All integer/binary + linear => ILP.\n    Mix of continuous and integer/binary + linear => MILP.\n\
    \    Any nonlinear function => NLP or MINLP.\n"
  check: 'For every identified component, can you point to a specific span in the problem text that supports it? Have you rejected archetype- expected components that lack textual grounding in this particular
    problem? Have you distinguished parameters from variables correctly? Have you captured implicit constraints suggested by the archetype? Does your model type classification match the variable types and
    function linearity you identified?

    '
- step: "Focus narrowly on the component identified in Stage A. Using your model skeleton from Stage C, evaluate each answer option:\n(a) For each option, check: does this match what you found in\n    Stage\
    \ C for the targeted component? Can you cite specific\n    textual evidence supporting or contradicting this option?\n\n(b) Eliminate options that:\n    - Contradict the problem text (e.g., listing\
    \ a parameter as a\n      decision variable)\n    - Include elements with no textual reference in the problem\n      description (even if semantically plausible)\n    - Mischaracterize the relationship\
    \ (e.g., wrong constraint\n      direction, wrong objective quantity)\n    - For questions about sets: represent an individual parameter\n      or variable, not an indexing collection.\n    - For questions\
    \ about constraint application (\"applied on\"):\n      incorrectly identify the domain/index set.\n\n(c) Among remaining options, prefer the one with the most direct\n    and complete textual support.\
    \ If an option partially matches\n    but includes an unsupported element, it is less preferable\n    than an option where every element has textual grounding.\n\n(d) If the question asks about model\
    \ type or problem category,\n    verify your classification against the full model skeleton:\n    check variable types for LP/ILP/MILP and function linearity\n    for NLP. Match the decision structure\
    \ to standard OR archetypes\n    for the problem category.\n\n(e) FOR NEGATION QUESTIONS (\"which is NOT\"): Invert your\n    reasoning. Identify the component that is FALSE or ABSENT\n    according\
    \ to your model skeleton. Verify that the other\n    options are indeed present/correct.\n\n(f) FOR PARAMETER/OBJECTIVE QUESTIONS: Match the parameter\n    description in the option to the exact parameter\
    \ described in\n    the text. Do not reject an option based on semantic nuances\n    (e.g., \"profit\" vs. \"revenue\") if the intended meaning is\n    clear from context and the indexing matches. Prioritize\n\
    \    textual correspondence over minor phrasing differences.\n\nState your final answer with explicit justification referencing the problem text.\n"
  check: 'Have you evaluated every answer option against the problem text? Have you eliminated options with elements that lack textual support? Is your selected answer consistent with ALL components of
    your model skeleton? If the question has a negation ("which is NOT"), have you inverted your reasoning correctly? For "applied on" questions, does your answer correctly identify the constraint domain/index
    set? Can you justify your answer with a direct quote or paraphrase from the problem description?

    '
common_failures:
- 'Accepting a decision variable that sounds plausible but has no explicit textual support in the problem description. ORQA expert reasoning consistently rejects options that lack a direct reference in
  the text, even when they are semantically related to the problem. For example, "broadcast order" may sound like a scheduling decision, but if the problem only says "decide which shows to broadcast," the
  decision is a broadcast indicator (binary), not ordering.

  '
- 'Confusing a data parameter with a decision variable, or vice versa. Parameters are given constants (costs, capacities, demands, durations, quality scores); variables are quantities the decision-maker
  chooses. A reliable test: if the problem says "you know the cost" or "each task has a duration," those are parameters. If it says "you must decide how many" or "determine which to select," those are variables.
  Archetype priors help: in transportation, shipping cost is always a parameter; quantity shipped is always a variable.

  '
- 'Misidentifying the objective direction or quantity -- for example, reading "minimize cost" as "maximize profit," or missing a min-max fairness objective ("no one benefits significantly more") which implies
  minimizing the gap between best and worst outcomes, not simply maximizing a total. Always quote the exact goal sentence from the problem text and verify the direction and quantity match.

  '
- 'Overlooking implicit constraints that the archetype predicts. Common examples: inventory balance equations in production planning (inventory_end = inventory_start + production - demand), logical linking
  constraints in facility location (if facility is closed, no shipment from it), flow conservation in network problems (inflow = outflow at each node), binary restrictions on open/close decisions, and non-negativity
  of continuous variables. Re-read the problem specifically looking for these archetype-predicted constraints.

  '
- 'Misinterpreting question phrasing, especially negations ("which is NOT") and relational prepositions ("applied on"). For "applied on", the answer is the domain/index set the constraint is defined over
  (e.g., "for each machine"), not the constraint type or the entities being constrained. For negation questions, carefully identify the component that is false or absent.

  '
- 'Over-interpreting answer options and rejecting correct matches due to minor semantic differences (e.g., "profit" vs. "revenue") or redundant indexing. Prioritize textual correspondence: if the problem
  describes "revenue per unit per path" and an option says "profit contribution for each path, oil well, and refinery", accept it as a match for the revenue parameter if the indexing is correct and the
  intended meaning is clear from context.

  '
verification: 'After completing the analysis, cross-check every identified component against the original problem text. For each decision variable, confirm a supporting text span exists. For each parameter,
  confirm it is given data. For each constraint, confirm the LHS meaning, RHS value, and the set element it applies to. Verify the objective direction and quantity match the goal sentence. Confirm the model
  type is consistent with the variable types and function linearity you identified. Verify your archetype choice is supported by at least two trigger cues from the text. If the question offers answer choices,
  compare your analysis against each option and eliminate those that contradict the problem text. For negation questions, double-check that your selected answer is indeed the false/absent one.

  '

name: combinatorial-optimization-solving
version: v1_curated
source: curated
domain: operations_research
task_type: combinatorial_optimization
when_to_use: When solving a combinatorial optimization problem that involves selecting the best arrangement, assignment, or subset from a finite set of discrete alternatives
when_not_to_use: When the problem has continuous decision variables and a linear structure better suited to linear programming methods
preconditions:
- The problem involves choosing from a discrete and finite set of alternatives or configurations
- There is a well-defined objective function to maximize or minimize over feasible solutions
- Constraints define which combinations or arrangements are feasible
procedure:
- step: 'Identify the combinatorial structure. Determine what discrete objects you are choosing, arranging, or assigning. Classify the problem type: is it a selection of a subset, a permutation, an assignment,
    a shortest path, a spanning tree, a scheduling problem, or a knapsack-type problem?'
  check: What are you choosing from? Can you describe the solution space? Is it permutations, subsets, assignments, paths, or matchings? Have you correctly identified the combinatorial structure?
- step: Define the objective function and feasibility criteria. State exactly what quantity is being optimized and what makes a solution feasible. Express the objective in terms of the discrete choices.
  check: What makes a solution feasible? What quantity are you optimizing? Is it a sum, a maximum, a count, or some other function of your discrete choices? Is the direction (max or min) correct?
- step: List ALL constraints explicitly. Re-read the problem and translate every requirement into a precise condition. Watch for capacity limits, ordering requirements, exclusion rules, precedence constraints,
    and cardinality bounds.
  check: Re-read the problem. Have you captured every restriction? Are there any capacity limits, mutual exclusions, ordering requirements, or cardinality bounds you overlooked? Does each constraint correctly
    reference the decision elements?
- step: Bound or enumerate the solution space. Calculate how many feasible solutions exist. For small problems, list all feasible solutions explicitly. For larger problems, establish bounds on the optimal
    value using relaxations or greedy heuristics to guide your search.
  check: How many feasible solutions exist? Can you list them all? If the space is large, have you established an upper or lower bound? Can you prune any clearly suboptimal solutions from consideration?
- step: 'Apply the appropriate solution technique. For small solution spaces, enumerate all feasible solutions and evaluate the objective for each. For structured problems, apply the right algorithmic technique:
    greedy algorithms for matroid-structured problems, dynamic programming for problems with optimal substructure, branch and bound for integer programs, or network flow algorithms for assignment and path
    problems. Justify why your chosen technique gives an optimal solution.'
  check: 'For enumeration: have you evaluated every feasible solution? For algorithmic approaches: have you justified why the technique produces an optimal (not just good) solution? Have you handled all
    edge cases and tie-breaking correctly?'
- step: Verify your answer. Check that the claimed optimal solution satisfies all constraints. Verify the objective value by direct computation. Confirm no alternative feasible solution achieves a better
    objective value, or argue optimality through the technique used. Match against the provided answer choices.
  check: Does your solution satisfy all constraints? Is the objective value correctly computed? Have you checked neighboring solutions or argued optimality? Does your answer match one of the given options?
common_failures:
- Overlooking a constraint or feasibility condition, especially implicit rules like capacity limits, precedence requirements, or mutual exclusion conditions stated indirectly
- Missing feasible solutions during enumeration, particularly when the problem has an irregular or non-obvious solution space structure
- Applying a greedy algorithm without verifying that the greedy choice property holds for this specific problem, leading to a locally optimal but globally suboptimal answer
- Miscounting permutations, subsets, or assignments, leading to an incorrect enumeration of the feasible solution space
verification: Check that your claimed optimal solution satisfies every constraint. Recompute the objective value by direct calculation. For enumeration, verify no feasible solution was missed and confirm
  the selected solution has the best objective. For algorithmic approaches, verify the correctness condition of the technique applies. Confirm your answer matches one of the provided options.

name: Linear Programming Optimization via Graphical Method
version: v0_self_generated
source: self_generated
domain: operations_research
task_type: linear_programming
when_to_use:
- The problem asks to maximize or minimize a quantity (profit, cost, etc.)
- The objective is a linear function of decision variables
- Constraints are linear inequalities or equations involving the same variables
- Decision variables are non-negative (or have simple bounds)
- The problem has exactly two decision variables, or can be reduced to two for visualization
when_not_to_use:
- Problem has more than two decision variables (requires simplex or other method)
- Objective or constraints are nonlinear
- Variables must take integer values (integer programming)
- Problem involves uncertainty or probabilities (stochastic programming)
- "Constraints include strict inequalities (< or > instead of \u2264 or \u2265)"
preconditions:
- All constraints and the objective can be expressed as linear relationships
- A feasible region exists (constraints are not contradictory)
- The optimal solution is finite (problem is not unbounded)
procedure:
- step: Define decision variables. Assign symbols (e.g., x, y) to the quantities to be determined.
  check: Variables clearly represent the choices under control (e.g., units produced, acres planted).
- step: Formulate the objective function. Write a linear expression for the quantity to maximize or minimize in terms of the decision variables.
  check: Objective is linear (no powers, products, or nonlinear functions of variables).
- step: Formulate the constraints. Translate each resource limitation, requirement, or condition into a linear inequality or equation.
  check: "Each constraint uses the same variables as the objective, is linear, and includes a relational operator (\u2264, \u2265, =)."
- step: "Add non-negativity constraints. Explicitly state that decision variables are \u2265 0 unless otherwise specified."
  check: All variables have non-negativity restrictions (or specified bounds).
- step: Graph the feasible region. Plot each constraint inequality on a coordinate system (x-axis for first variable, y-axis for second). Shade the region satisfying all constraints and non-negativity.
  check: The feasible region is a convex polygon (or line segment) bounded by the constraint lines.
- step: Identify corner points. Find the coordinates of all vertices (corner points) of the feasible region by solving the intersection of the relevant constraint lines.
  check: Each corner point satisfies all constraints. Include intersections with axes if they are feasible.
- step: Evaluate the objective function at each corner point. Substitute the coordinates of each corner point into the objective function.
  check: A numerical value for the objective is computed for each corner point.
- step: Select the optimal solution. For maximization, choose the corner point giving the largest objective value; for minimization, choose the smallest.
  check: The chosen point is feasible and yields the optimum among all corner points.
common_failures:
- Misidentifying the feasible region by shading the wrong side of a constraint line.
- Forgetting non-negativity constraints, leading to an incorrect feasible region.
- Missing a corner point, especially intersections with axes.
- Arithmetic errors when solving for intersection points of constraints.
- Not checking that the optimal corner point satisfies all constraints.
verification: Confirm the optimal solution by checking that a small movement away from the chosen corner point along any edge of the feasible region does not improve the objective (for maximization, objective
  decreases; for minimization, objective increases).

name: "or-model-identification"
version: "v1_curated"
source: "curated"
domain: "operations_research"
task_type: "or_model_identification"

# Metadata & citations
# ---------------------------------------------------------------------------
# This skill is grounded in three sources:
#   1. ORQA validation set expert reasoning (45 instances, Q1-Q11) --
#      patterns for identifying objectives, constraints, sets, parameters,
#      decision variables, model type, and constraint semantics from
#      natural-language problem descriptions.
#   2. LLMOPT five-element formulation (Li et al., 2023) --
#      Sets -> Parameters -> Variables -> Objective -> Constraints.
#   3. SkillsBench SKILL.md format (Didolkar et al., 2024) --
#      procedure/check/common_failures structure.
#
# Architecture: Three-layer design (meta framework / archetype library /
# high-precision local rules) expressed as a 4-stage procedure. Layer 2
# (archetype library) is embedded inline in Stage B and constitutes the
# core differentiator from the generic scaffold.
# ---------------------------------------------------------------------------

when_to_use: >
  When answering questions that require identifying components of an
  optimization model from a natural-language problem description --
  including decision variables, parameters, sets, objective function,
  constraints, problem category, or model type (LP/IP/MILP/NLP).

when_not_to_use: >
  When asked to numerically solve an optimization model, generate code,
  prove optimality, or apply advanced OR techniques such as decomposition,
  column generation, or metaheuristics. This skill covers model
  identification only, not solution procedures.

preconditions:
  - "A natural-language description of an optimization scenario is provided, containing a decision-maker, a goal, controllable choices, given data, and restrictions."
  - "The question asks about one or more model components: objective criterion, constraints, sets, parameters, decision variables, problem category, or model type."
  - "Enough contextual detail exists in the problem description to distinguish the requested component from plausible distractors."

procedure:
  # =========================================================================
  # Stage A -- Determine Question Target (Layer 1 — brief)
  # =========================================================================
  # ORQA expert pattern: before analyzing the full model, first determine
  # what specific component the question asks about (Q1 -> objective,
  # Q2/Q7 -> constraints, Q5 -> sets, Q6 -> decision variables, Q8 ->
  # parameters, Q9 -> objective components, Q3 -> problem category,
  # Q4 -> model type, Q10/Q11 -> constraint semantics/relationships).
  # This focuses downstream reasoning on the relevant component.
  # =========================================================================
  - step: >
      Read the question stem carefully before analyzing the problem
      description. Determine what specific model component the question
      asks about. The target will be one of:
      (a) Decision variables / decision activities -- what the decision-maker
          controls or chooses;
      (b) Parameters / given data -- fixed constants, coefficients, costs,
          capacities, demands;
      (c) Objective function -- what is maximized or minimized, and which
          variables and parameters participate;
      (d) Constraints / restrictions -- limits, requirements, balance
          equations, logical conditions;
      (e) Sets -- indexing collections (time periods, locations, products,
          people, machines);
      (f) Model type -- LP, ILP, MILP, NLP classification;
      (g) Problem category -- assignment, routing, scheduling, blending,
          facility location, etc.;
      (h) Relationships -- how specific components relate to each other
          (e.g., which parameter appears in which constraint).
      Note any qualifiers in the question: negations ("which is NOT"),
      superlatives ("which BEST"), or specificity ("which of the following
      constraints" vs. "which constraint type").
    check: >
      Can you state in one sentence what model component the question
      targets? Have you noted any negations, qualifiers, or specificity
      in the question stem? Is your identified target one of the eight
      categories listed above? Have you avoided jumping to the problem
      description before understanding the question?

  # =========================================================================
  # Stage B -- Map Scenario to Archetype (Layer 2 — THIS IS THE CORE VALUE)
  # =========================================================================
  # ORQA expert pattern: expert reasoning traces consistently show that
  # recognizing the problem archetype early (Q3 -> "this is an assignment
  # problem", Q6 -> "the decisions are about allocating X to Y") provides
  # strong priors about which variables, constraints, and objective forms
  # to expect. This archetype-first approach prevents common errors like
  # treating parameters as decisions or missing implicit constraints.
  #
  # The archetype library below covers 7 common OR problem families. Each
  # entry provides: trigger cues (phrases that signal this archetype),
  # expected variable types, typical objective, typical constraints, and
  # common confusions specific to that archetype.
  # =========================================================================
  - step: >
      Read the full problem description. Identify trigger cues and match
      the scenario to one of the following OR archetypes. Use the matched
      archetype to activate priors about expected model components.

      --- ARCHETYPE LIBRARY ---

      **Assignment/Matching:**
      - Trigger cues: "assign X to Y", "allocate workers to tasks",
        "match patients to rooms", "select which items to include"
      - Variables: binary x_ij indicating whether entity i is assigned
        to entity j (or binary selection indicators)
      - Objective: minimize total cost or distance, maximize total
        satisfaction or value or rating score
      - Constraints: each task assigned exactly once, each worker or
        resource has a capacity limit, assignment feasibility (not every
        pair is valid)
      - Common confusion: treating demand or capacity (a parameter) as a
        decision variable; mistaking "broadcast order" for a decision
        when only "broadcast indicator" (whether to air) is decided

      **Routing/Network:**
      - Trigger cues: "route through", "ship from...to...", "network
        flow", "shortest path", "deliver along routes", "distribute
        through a network"
      - Variables: flow quantities on arcs (continuous), binary route
        selections, number of items on each route
      - Objective: minimize total transportation cost or distance,
        maximize total flow or throughput
      - Constraints: flow conservation at each node (inflow = outflow),
        arc capacity limits, supply limits at sources, demand satisfaction
        at destinations
      - Common confusion: confusing node capacity with arc capacity;
        listing "number of sources" or "number of destinations" as
        decisions when they are given data (sets)

      **Scheduling/Timetabling:**
      - Trigger cues: "schedule tasks", "time slots", "sequence jobs",
        "due dates", "broadcasting lineup", "shift scheduling",
        "assign sessions to rooms"
      - Variables: start times (continuous), binary assignment of tasks
        to slots or machines, completion times, sequencing indicators
      - Objective: minimize makespan or total tardiness or completion
        time, maximize utilization or total value of completed tasks
      - Constraints: precedence relations (task A before task B), no
        overlap on a single machine, resource capacity per period,
        deadline satisfaction, transition or setup times between tasks
      - Common confusion: treating processing time or duration (a
        parameter) as a decision variable; confusing "task order" with
        "task selection" when the problem only decides which tasks to do

      **Blending/Mixing:**
      - Trigger cues: "blend", "mix ingredients", "recipe", "meet
        quality specifications", "combine raw materials"
      - Variables: continuous proportions or quantities of each
        ingredient in the blend
      - Objective: minimize total cost of the blend or mixture
      - Constraints: quality specification bounds (minimum and maximum
        for each attribute like protein content, fat percentage),
        total quantity or volume requirement, availability limits
        for each ingredient
      - Common confusion: treating a quality specification threshold
        (a parameter) as a decision; confusing the blend ratio
        (decision) with the ingredient quality score (parameter)

      **Facility Location:**
      - Trigger cues: "open or close facilities", "locate warehouses",
        "decide which plants to build", "select sites", "which
        hospitals to close"
      - Variables: binary open/close indicators for each facility +
        continuous allocation of demand to open facilities
      - Objective: minimize total fixed cost (opening) + variable cost
        (shipping or assignment), or maximize coverage or efficiency
      - Constraints: demand satisfaction (each customer served), capacity
        limit if facility is open, logical linking (cannot ship from or
        assign to a closed facility), cardinality limit (at most k
        facilities open)
      - Common confusion: missing the binary nature of open/close
        decisions, leading to MILP misclassified as LP; forgetting the
        linking constraint between binary open/close and continuous flow

      **Production Planning/Lot-sizing:**
      - Trigger cues: "produce over multiple periods", "inventory
        levels", "holding cost", "setup cost per period", "multi-period
        production"
      - Variables: production quantities per period (continuous or
        integer), inventory levels at end of each period, binary setup
        indicators (whether to produce in a given period)
      - Objective: minimize total production cost + holding cost +
        setup cost over all periods
      - Constraints: inventory balance equation (inventory_end =
        inventory_begin + production - demand), production capacity per
        period, storage capacity limit, non-negativity of inventory
      - Common confusion: missing the inventory balance equation as a
        constraint; treating demand per period (a parameter) as a
        decision variable; confusing "number of periods" (a set) with a
        decision

      **Transportation:**
      - Trigger cues: "transport from sources to destinations", "supply
        and demand", "shipping cost from factory to customer", "delivery
        from warehouses to stores"
      - Variables: quantity shipped on each source-destination route
        (continuous)
      - Objective: minimize total shipping or transportation cost
      - Constraints: supply limits at each source (total shipped out
        does not exceed supply), demand satisfaction at each destination
        (total received meets or exceeds demand), non-negativity of
        shipment quantities
      - Common confusion: confusing total supply or total demand (an
        aggregate parameter) with per-route capacity; treating shipping
        cost (a parameter) as a decision variable

      --- END ARCHETYPE LIBRARY ---

      After identifying the archetype, also apply these high-precision
      local rules (Layer 3):
      - "assign...to..." or "allocate...to..." => assignment archetype
      - "maximize profit" or "minimize cost" => confirms objective direction
      - "at most" => upper bound constraint (<=)
      - "at least" => lower bound constraint (>=)
      - "exactly" => equality constraint (=)
      - "whether to open/close" or "decide which to build" => binary
        variable present => model is MILP or ILP, not pure LP
      - "for each" or "per" => signals the constraint or parameter is
        indexed over a set

      If the scenario does not clearly match a single archetype, identify
      the closest one and note the deviation. Some problems blend two
      archetypes (e.g., facility location with transportation).
    check: >
      Have you identified the primary archetype for this problem? Can you
      cite at least two trigger cues from the problem text that support
      your archetype choice? Have you activated the archetype-specific
      priors for variables, objective, and constraints? If the problem
      blends archetypes, have you noted which elements come from which
      archetype? Have you applied any relevant high-precision local rules?

  # =========================================================================
  # Stage C -- Instantiate Model Skeleton (using archetype priors)
  # =========================================================================
  # ORQA expert pattern (Q5, Q6, Q8, Q1, Q2, Q7): after recognizing the
  # archetype, systematically fill in each model component. For every
  # component, require textual evidence from the problem description.
  # The archetype priors tell you WHAT TO LOOK FOR; the problem text
  # tells you WHAT ACTUALLY EXISTS. Accept only components with direct
  # textual support. Reject archetype-expected components that have no
  # textual grounding in this specific problem.
  # =========================================================================
  - step: >
      Using the archetype priors from Stage B as guidance for what to
      look for, systematically instantiate the model skeleton by filling
      in each component with evidence from the problem text:

      (1) SETS -- Identify the indexing collections. These are groups of
          entities you iterate over: time periods, locations, products,
          customers, machines, workers, routes. A set is "the collection
          you iterate over," NOT an individual number or cost. For each
          set, cite the text that establishes it.

      (2) DECISION VARIABLES -- Identify what the decision-maker can
          control or choose. For each candidate variable, verify: "Does
          the problem text explicitly say this is something the decision-
          maker decides?" The archetype priors suggest likely variable
          types (binary for assignment, continuous for blending, etc.)
          but only accept variables with direct textual support. Classify
          each as continuous, binary, or integer.

      (3) PARAMETERS -- Identify given constants and fixed data: costs,
          capacities, demands, distances, durations, quality scores. For
          each parameter, note which sets it is indexed over (e.g.,
          "shipping cost" indexed over factories x customers). If the
          value is given and fixed, it is a parameter; if the decision-
          maker chooses it, it is a variable.

      (4) OBJECTIVE -- State the direction (maximize or minimize) and
          the quantity being optimized. Identify which decision variables
          and which parameters participate as coefficients. Cross-check
          against the archetype's expected objective form. If the
          objective involves no explicit data parameters (e.g., minimizing
          makespan), state that clearly.

      (5) CONSTRAINTS -- For each constraint, determine:
          (a) Type: capacity limit, demand satisfaction, balance equation,
              assignment, cardinality bound, logical/linking, non-negativity
          (b) Left-hand side: what is aggregated and over which index
          (c) Relation: <=, >=, or =
          (d) Right-hand side: what given data or value
          (e) Applied on: which set element ("for each customer", "for
              each period")
          Pay special attention to implicit constraints suggested by the
          archetype: inventory balance equations for lot-sizing, linking
          constraints for facility location, flow conservation for
          networks, non-negativity and binary restrictions.

      (6) MODEL TYPE -- Based on variables and function forms:
          All continuous + linear => LP.
          All integer/binary + linear => ILP.
          Mix of continuous and integer/binary + linear => MILP.
          Any nonlinear function => NLP or MINLP.
    check: >
      For every identified component, can you point to a specific span
      in the problem text that supports it? Have you rejected archetype-
      expected components that lack textual grounding in this particular
      problem? Have you distinguished parameters from variables correctly?
      Have you captured implicit constraints suggested by the archetype?
      Does your model type classification match the variable types and
      function linearity you identified?

  # =========================================================================
  # Stage D -- Answer Against Options
  # =========================================================================
  # ORQA expert pattern (across all Q types): the final step focuses
  # narrowly on the specific component the question asks about. Expert
  # reasoning traces consistently: (a) enumerate candidate answers from
  # the options, (b) check each against the problem text, (c) eliminate
  # options that contradict the text or lack textual support, and
  # (d) prefer the option with the most direct textual evidence.
  # =========================================================================
  - step: >
      Focus narrowly on the component identified in Stage A. Using your
      model skeleton from Stage C, evaluate each answer option:

      (a) For each option, check: does this match what you found in
          Stage C for the targeted component? Can you cite specific
          textual evidence supporting or contradicting this option?

      (b) Eliminate options that:
          - Contradict the problem text (e.g., listing a parameter as a
            decision variable)
          - Include elements with no textual reference in the problem
            description (even if semantically plausible)
          - Mischaracterize the relationship (e.g., wrong constraint
            direction, wrong objective quantity)

      (c) Among remaining options, prefer the one with the most direct
          and complete textual support. If an option partially matches
          but includes an unsupported element, it is less preferable
          than an option where every element has textual grounding.

      (d) If the question asks about model type or problem category,
          verify your classification against the full model skeleton:
          check variable types for LP/ILP/MILP and function linearity
          for NLP. Match the decision structure to standard OR archetypes
          for the problem category.

      State your final answer with explicit justification referencing
      the problem text.
    check: >
      Have you evaluated every answer option against the problem text?
      Have you eliminated options with elements that lack textual support?
      Is your selected answer consistent with ALL components of your model
      skeleton? If the question has a negation ("which is NOT"), have you
      inverted your reasoning correctly? Can you justify your answer with
      a direct quote or paraphrase from the problem description?

common_failures:
  - >
    Accepting a decision variable that sounds plausible but has no
    explicit textual support in the problem description. ORQA expert
    reasoning consistently rejects options that lack a direct reference
    in the text, even when they are semantically related to the problem.
    For example, "broadcast order" may sound like a scheduling decision,
    but if the problem only says "decide which shows to broadcast," the
    decision is a broadcast indicator (binary), not ordering.
  - >
    Confusing a data parameter with a decision variable, or vice versa.
    Parameters are given constants (costs, capacities, demands, durations,
    quality scores); variables are quantities the decision-maker chooses.
    A reliable test: if the problem says "you know the cost" or "each task
    has a duration," those are parameters. If it says "you must decide how
    many" or "determine which to select," those are variables. Archetype
    priors help: in transportation, shipping cost is always a parameter;
    quantity shipped is always a variable.
  - >
    Misidentifying the objective direction or quantity -- for example,
    reading "minimize cost" as "maximize profit," or missing a min-max
    fairness objective ("no one benefits significantly more") which implies
    minimizing the gap between best and worst outcomes, not simply
    maximizing a total. Always quote the exact goal sentence from the
    problem text and verify the direction and quantity match.
  - >
    Overlooking implicit constraints that the archetype predicts. Common
    examples: inventory balance equations in production planning
    (inventory_end = inventory_start + production - demand), logical
    linking constraints in facility location (if facility is closed,
    no shipment from it), flow conservation in network problems
    (inflow = outflow at each node), binary restrictions on open/close
    decisions, and non-negativity of continuous variables. Re-read the
    problem specifically looking for these archetype-predicted constraints.

verification: >
  After completing the analysis, cross-check every identified component
  against the original problem text. For each decision variable, confirm
  a supporting text span exists. For each parameter, confirm it is given
  data. For each constraint, confirm the LHS meaning, RHS value, and
  the set element it applies to. Verify the objective direction and
  quantity match the goal sentence. Confirm the model type is consistent
  with the variable types and function linearity you identified. Verify
  your archetype choice is supported by at least two trigger cues from
  the text. If the question offers answer choices, compare your analysis
  against each option and eliminate those that contradict the problem text.

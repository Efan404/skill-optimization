models:
  deepseek:
    provider: "openai_compatible"
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"
    api_key_env: "DEEPSEEK_API_KEY"
    temperature: 0
    max_tokens: 8192
    timeout: 600
    retry:
      max_retries: 3
      backoff_seconds: 5
    min_delay_between_calls: 0.0

  openrouter_free:
    provider: "openai_compatible"
    base_url: "https://openrouter.ai/api/v1"
    model: "openai/gpt-oss-120b:free"
    api_key_env: "OPENROUTER_API_KEY"
    temperature: 0
    max_tokens: 8192
    timeout: 600
    retry:
      max_retries: 3
      backoff_seconds: 5
    min_delay_between_calls: 0.0

  mistral_small:
    provider: "openai_compatible"
    base_url: "https://openrouter.ai/api/v1"
